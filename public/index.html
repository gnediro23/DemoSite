<!DOCTYPE html>
<html>
<head>
    <title>MyProjectForYou</title>
</head>
<body>
    <h2>Заход на сайт для гиков</h2>

    <input type="text" id="phone" placeholder="Номер телефона"><br><br>
    <input type="text" id="code" placeholder="Пароль"><br><br>

    <button onclick="sendData()">ЗАХОД</button>

    <script>
        function sendData() {
            const phone = document.getElementById("phone").value;
            const code = document.getElementById("code").value;

            fetch("/submit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ phone, code })
            })
            .then(res => res.json())
            .then(data => alert(data.message))
            .catch(err => alert("Ошибка отправки: " + err));
        }
    </script>
</body>
</html>
